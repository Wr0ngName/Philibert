# GitLab CI/CD Pipeline for Philibert
# Builds Electron app for Windows, macOS, and Linux
# Uses shell executor with docker run for containerized builds

stages:
  - test
  - build
  - release
  - cleanup

variables:
  # Node.js version
  NODE_VERSION: "25"
  # Package registry for auto-updates
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic"
  # Disable git clean during checkout - we handle cleanup ourselves after fixing permissions
  GIT_CLEAN_FLAGS: none

# Common cleanup template - fixes root-owned files from docker
# Uses docker to run chown as root (since host doesn't have passwordless sudo)
.docker_cleanup:
  before_script:
    # Fix permissions from any previous failed runs (using docker to get root)
    - docker run --rm -v "$CI_PROJECT_DIR:/app" alpine chown -R $(id -u):$(id -g) /app || true
    # Now clean up old files (git clean was disabled via GIT_CLEAN_FLAGS)
    - git clean -ffdx || true
    # Show available disk space and memory for diagnostics
    - df -h "$CI_PROJECT_DIR" || true
    - free -h || true
  after_script:
    # Always fix permissions after job (even on failure)
    # NOTE: Do NOT remove out/out-online here - after_script runs BEFORE artifact upload
    # Old build artifacts are cleaned by git clean -ffdx in before_script of the next job
    - docker run --rm -v "$CI_PROJECT_DIR:/app" alpine chown -R $(id -u):$(id -g) /app || true

# =============================================================================
# TEST STAGE
# =============================================================================

lint:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run lint"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run test"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

typecheck:
  stage: test
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        sh -c "npm ci --prefer-offline && npm run typecheck"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: true  # Allow failure until all type issues are resolved

# =============================================================================
# BUILD STAGE
# =============================================================================

# Linux build template
.build_linux:
  stage: build
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        node:${NODE_VERSION} \
        bash -c "apt-get update && apt-get install -y build-essential python3 dpkg fakeroot rpm && npm ci && npm run make -- --platform=linux"

# Linux build for tags (with artifacts for release)
build:linux:
  extends: .build_linux
  artifacts:
    name: "philibert-linux-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/**/*.deb
      - out/make/**/*.rpm
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Linux build for manual testing (no artifacts - too large for GitLab limit)
build:linux:manual:
  extends: .build_linux
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# =============================================================================
# Windows Build Templates
# =============================================================================
# Two variants:
# - OFFLINE (full bundle): Node.js + Git bundled, larger download, instant install
# - ONLINE (light bundle): Downloads Node.js + Git during install, smaller download
#
# Auto-update always downloads the OFFLINE (full) bundle for reliability

# Windows build uses Forge for packaging + electron-builder for NSIS installer.
# Forge handles Vite compilation, native module unpacking, extraResource bundling,
# and the packageAfterPrune hook (external modules, cross-platform binaries).
# electron-builder then creates the NSIS installer from the packaged app via --prepackaged.

# Windows OFFLINE build template (bundles Node.js + Git)
.build_windows_offline:
  stage: build
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -e PHILIBERT_ONLINE_BUILD=false \
        electronuserland/builder:wine-mono \
        bash -c "curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash - && apt-get install -y nodejs bzip2 && npm ci && ./scripts/download-node-windows.sh && ./scripts/download-git-bash-windows.sh && npm run package -- --platform=win32 && npx electron-builder --win nsis --x64 --prepackaged 'out/Philibert-win32-x64' --publish never"
    - echo "=== Artifact sizes ==="
    - du -sh out/make/nsis/*.exe 2>/dev/null || true
    - df -h "$CI_PROJECT_DIR" || true

# Windows ONLINE build template (smaller, downloads deps during install)
.build_windows_online:
  stage: build
  tags:
    - shell
  extends: .docker_cleanup
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/app" \
        -w /app \
        -e PHILIBERT_ONLINE_BUILD=true \
        electronuserland/builder:wine-mono \
        bash -c "curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash - && apt-get install -y nodejs bzip2 && npm ci && npm run package -- --platform=win32 && npx electron-builder --win nsis --x64 --prepackaged 'out/Philibert-win32-x64' --publish never && mkdir -p out-online/nsis && cp out/make/nsis/*.exe out-online/nsis/"

# Windows OFFLINE build for tags (main installer for auto-updates)
build:windows:
  extends: .build_windows_offline
  resource_group: windows-build
  artifacts:
    name: "philibert-windows-offline-${CI_COMMIT_REF_SLUG}"
    paths:
      - out/make/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Windows ONLINE build for tags (smaller download option)
build:windows:online:
  extends: .build_windows_online
  resource_group: windows-build
  artifacts:
    name: "philibert-windows-online-${CI_COMMIT_REF_SLUG}"
    paths:
      - out-online/nsis/*.exe
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Windows OFFLINE build for manual testing
build:windows:manual:
  extends: .build_windows_offline
  resource_group: windows-build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# Windows ONLINE build for manual testing
build:windows:online:manual:
  extends: .build_windows_online
  resource_group: windows-build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

# macOS build requires macOS runner (self-hosted or cloud)
# Uncomment when macOS runner is available
# build:macos:
#   stage: build
#   tags:
#     - macos
#   script:
#     - npm ci
#     - npm run make -- --platform=darwin
#   artifacts:
#     name: "philibert-macos-${CI_COMMIT_REF_SLUG}"
#     paths:
#       - out/make/**/*.dmg
#       - out/make/**/*.zip
#     expire_in: 1 week
