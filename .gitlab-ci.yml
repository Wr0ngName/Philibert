# =============================================================================
# RELEASE STAGE
# =============================================================================

# Upload artifacts to GitLab Package Registry for auto-updates
# Publishes both OFFLINE (for auto-update) and ONLINE (for initial download) Windows builds
publish:packages:
  stage: release
  tags:
    - shell
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
    - job: build:windows:online
      artifacts: true
  script:
    - |
      # Get version from tag
      VERSION=${CI_COMMIT_TAG#v}

      echo "Publishing version ${VERSION} to package registry..."

      # Initialize release info file
      mkdir -p release-info
      echo "TAG_VERSION=${VERSION}" > release-info/urls.env

      # Upload Linux DEB
      for file in out/make/deb/x64/*.deb; do
        if [ -f "$file" ]; then
          DEB_NAME=$(basename "$file")
          DEB_URL="${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${DEB_NAME}"
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${DEB_URL}"
          echo "DEB_NAME=${DEB_NAME}" >> release-info/urls.env
          echo "DEB_URL=${DEB_URL}" >> release-info/urls.env
        fi
      done

      # Upload Linux RPM
      for file in out/make/rpm/x64/*.rpm; do
        if [ -f "$file" ]; then
          RPM_NAME=$(basename "$file")
          RPM_URL="${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${RPM_NAME}"
          echo "Uploading $file..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${RPM_URL}"
          echo "RPM_NAME=${RPM_NAME}" >> release-info/urls.env
          echo "RPM_URL=${RPM_URL}" >> release-info/urls.env
        fi
      done

      # Upload Windows OFFLINE installer (replace spaces in filename with dashes for URL)
      # This is the main installer used for auto-updates
      for file in out/make/nsis/*.exe; do
        if [ -f "$file" ]; then
          WIN_NAME=$(basename "$file" | tr ' ' '-')
          WIN_URL="${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${WIN_NAME}"
          echo "Uploading OFFLINE installer: $file as ${WIN_NAME}..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${WIN_URL}"
          echo "WIN_NAME=${WIN_NAME}" >> release-info/urls.env
          echo "WIN_URL=${WIN_URL}" >> release-info/urls.env

          # Also upload with -offline suffix for clarity in release notes
          WIN_OFFLINE_NAME="${WIN_NAME%.exe}-offline.exe"
          if [ "${WIN_OFFLINE_NAME}" != "${WIN_NAME}" ]; then
            WIN_OFFLINE_URL="${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${WIN_OFFLINE_NAME}"
            echo "Uploading as ${WIN_OFFLINE_NAME}..."
            curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
                 --upload-file "$file" \
                 "${WIN_OFFLINE_URL}"
            echo "WIN_OFFLINE_NAME=${WIN_OFFLINE_NAME}" >> release-info/urls.env
            echo "WIN_OFFLINE_URL=${WIN_OFFLINE_URL}" >> release-info/urls.env
          fi
        fi
      done

      # Upload Windows ONLINE installer (from build:windows:online job)
      # Stored in out-online/ to avoid conflicts with offline build
      # Smaller download, downloads Node.js + Git during installation
      for file in out-online/nsis/*.exe; do
        if [ -f "$file" ]; then
          WIN_ONLINE_NAME=$(basename "$file" | tr ' ' '-' | sed 's/\.exe$/-online.exe/')
          WIN_ONLINE_URL="${PACKAGE_REGISTRY_URL}/releases/${VERSION}/${WIN_ONLINE_NAME}"
          echo "Uploading ONLINE installer: $file as ${WIN_ONLINE_NAME}..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$file" \
               "${WIN_ONLINE_URL}"
          echo "WIN_ONLINE_NAME=${WIN_ONLINE_NAME}" >> release-info/urls.env
          echo "WIN_ONLINE_URL=${WIN_ONLINE_URL}" >> release-info/urls.env
        fi
      done

      # Generate latest.yml for electron-updater auto-updates
      echo "Creating latest.yml..."
      WIN_EXE=$(ls out/make/nsis/*.exe 2>/dev/null | head -1)
      WIN_FILENAME=$(basename "$WIN_EXE" | tr ' ' '-')
      WIN_SHA512=$(sha512sum "$WIN_EXE" 2>/dev/null | cut -d' ' -f1 || echo "")
      RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      printf 'version: %s\npath: %s\nsha512: %s\nreleaseDate: %s\n' \
        "${VERSION}" "${WIN_FILENAME}" "${WIN_SHA512}" "${RELEASE_DATE}" > latest.yml
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file latest.yml \
           "${PACKAGE_REGISTRY_URL}/releases/${VERSION}/latest.yml"
      cp latest.yml release-info/latest.yml

      echo "Packages published successfully!"
      cat release-info/urls.env
  artifacts:
    paths:
      - release-info/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\.\d+)?$/

# Create GitLab Release using release-cli
create:release:
  stage: release
  tags:
    - shell
  needs:
    - job: publish:packages
      artifacts: true
  script:
    - |
      TAG=${CI_COMMIT_TAG}
      echo "Creating release for ${TAG}"

      # Job-local path so concurrent release jobs from other projects on the
      # same shell-executor runner can't clobber each other's description file
      # (the previous /tmp/release_description.md was a shared race window).
      RELEASE_DESC="${CI_PROJECT_DIR}/release_description.md"

      # Load URLs from publish:packages artifact
      source release-info/urls.env

      # Determine if this is an RC release
      IS_RC=false
      RC_NOTICE=""
      if echo "${TAG}" | grep -qE -- '-rc\.[0-9]+$'; then
        IS_RC=true
        RC_NOTICE=$'\n      > **⚠️ Release Candidate** — This is a pre-release for testing. Only users with update channel set to \"rc\" will receive this update.\n'
      fi

      # Create description file with actual URLs
      cat > "${RELEASE_DESC}" << DESCEOF
      ## Philibert ${TAG}
      ${RC_NOTICE}
      ### Downloads

      #### Linux
      - **DEB (Debian/Ubuntu)**: [${DEB_NAME}](${DEB_URL})
      - **RPM (Fedora/RHEL)**: [${RPM_NAME}](${RPM_URL})

      #### Windows
      - **Full Installer (Recommended)**: [${WIN_NAME}](${WIN_URL})
        - Includes Node.js and Git - ready to use immediately
      - **Online Installer (Smaller)**: [${WIN_ONLINE_NAME}](${WIN_ONLINE_URL})
        - Downloads Node.js and Git during installation (~150MB)
        - Smaller initial download, longer installation time

      ### Notes
      - Auto-updates always use the full (offline) installer for reliability
      - Windows 10 or later required

      ---
      *Built automatically by GitLab CI/CD*
      DESCEOF

      cat "${RELEASE_DESC}"

      docker run --rm \
        -e CI_JOB_TOKEN \
        -e CI_SERVER_URL \
        -e CI_PROJECT_ID \
        -v "${RELEASE_DESC}":/work/description.md:ro \
        -w /work \
        registry.gitlab.com/gitlab-org/release-cli:latest release-cli create \
          --name "Philibert ${TAG}" \
          --tag-name "${TAG}" \
          --description description.md
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\.\d+)?$/

# =============================================================================
# CLEANUP STAGE
# =============================================================================

# Delete older releases and Package Registry versions, keeping the last N.
# Runs after a successful release pipeline so there is always at least one
# release left to update to. The script is run inside an alpine container so
# we don't depend on jq being installed on the shell runner.
#
# allow_failure: true — if cleanup fails (transient API, auth, ...), the
# release itself is already done; we'd rather not fail the whole pipeline
# red over a janitorial step. Watch the job log if the registry starts
# growing again.
cleanup:old:
  stage: cleanup
  tags:
    - shell
  needs:
    - job: create:release
  variables:
    KEEP_LAST_N: "3"
  script:
    - |
      docker run --rm \
        -v "$CI_PROJECT_DIR:/work:ro" \
        -w /work \
        -e CI_API_V4_URL \
        -e CI_PROJECT_ID \
        -e CI_JOB_TOKEN \
        -e KEEP_LAST_N \
        alpine:latest sh -c "apk add --no-cache --quiet curl jq >/dev/null && sh scripts/cleanup-old-releases.sh"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\.\d+)?$/
  allow_failure: true
