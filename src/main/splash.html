<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philibert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg {
      width: 60px;
      height: 60px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .version {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 28px;
    }
    .progress-container {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      width: 30%;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 2px;
      animation: indeterminate 1.5s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); width: 30%; }
      50% { width: 50%; }
      100% { transform: translateX(350%); width: 30%; }
    }
    .status {
      font-size: 12px;
      opacity: 0.8;
      min-height: 16px;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <text x="256" y="360" font-family="Arial, sans-serif" font-size="220" font-weight="bold" fill="white" text-anchor="middle">P</text>
    </svg>
  </div>
  <div class="title">Philibert</div>
  <div class="version" id="version"></div>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
  <div class="status" id="status">Starting...</div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('splash-status', (_event, message) => {
      document.getElementById('status').textContent = message;
    });
    ipcRenderer.on('splash-version', (_event, version) => {
      document.getElementById('version').textContent = 'v' + version;
    });
  </script>
</body>
</html>
